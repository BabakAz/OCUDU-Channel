name: Deploy docs to GitHub Pages

# Manual-only until GitHub Pages is enabled on the repo
# (Settings → Pages → Source: GitHub Actions). Once enabled, switch this
# to also fire on push:
#   push:
#     branches: [main]
#     paths: ['docs/**', '.github/workflows/pages.yml']
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
